services:
  primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./primary/setup-replication.sh:/docker-entrypoint-initdb.d/02-setup-replication.sh
      - primary_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "wal_level=replica", "-c", "max_wal_senders=5", "-c", "wal_keep_size=64"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  replica:
    image: postgres:16
    ports:
      - "5431:5432"
    volumes:
      - ./replica/entrypoint.sh:/entrypoint.sh
      - replica_data:/var/lib/postgresql/data
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    depends_on:
      primary:
        condition: service_healthy

volumes:
  primary_data:
  replica_data:
